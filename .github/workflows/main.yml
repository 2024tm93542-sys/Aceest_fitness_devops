name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: anubhavgupta2810/aceest_fitness

jobs:

  # CI JOB (Kept exactly as provided)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      # SonarQube Analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Quality Gate Enforcement
      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # BUILD + PUSH JOB (Kept exactly as provided)
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and tag image
        run: |
          VERSION=v${{ github.run_number }}
          docker build -t $IMAGE_NAME:$VERSION .
          docker tag $IMAGE_NAME:$VERSION $IMAGE_NAME:latest

      - name: Push image
        run: |
          VERSION=v${{ github.run_number }}
          docker push $IMAGE_NAME:$VERSION
          docker push $IMAGE_NAME:latest
  
  # DEPLOY TO AKS
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      active_env: ${{ steps.toggle.outputs.active_env }}
      target_env: ${{ steps.toggle.outputs.target_env }}

    steps:
      - uses: actions/checkout@v4

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml

      - name: Verify cluster
        run: kubectl get nodes --kubeconfig=kubeconfig.yaml

      # 🟡 CANARY 
      - name: Prepare & Deploy Canary
        run: |
          VERSION=v${{ github.run_number }}
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_NAME:$VERSION|g" k8s-manifests/deployment.yaml > canary.yaml
          sed -i "s|name: flask-app|name: flask-app-canary|g" canary.yaml

          # Replace namespace in Canary Deployment
          sed -i "s|namespace: aceest-fitness|namespace: aceest-fitness-canary|g" canary.yaml

          # Replace placeholder so Canary has a valid label
          sed -i "s|VERSION_PLACEHOLDER|canary|g" canary.yaml
          
          kubectl create ns aceest-fitness-canary --kubeconfig=kubeconfig.yaml || true
          kubectl apply -n aceest-fitness-canary -f canary.yaml --kubeconfig=kubeconfig.yaml
          
          kubectl wait --for=condition=available deployment/flask-app-canary \
            -n aceest-fitness-canary --timeout=120s --kubeconfig=kubeconfig.yaml

      - name: Test Canary
        run: |
          kubectl port-forward deployment/flask-app-canary 9090:5000 \
            -n aceest-fitness-canary --kubeconfig=kubeconfig.yaml &
          sleep 5
          curl -f http://localhost:9090 | grep "ACEest Fitness API running"
          
      - name: Cleanup Canary
        run: |
          kubectl delete ns aceest-fitness-canary --kubeconfig=kubeconfig.yaml || true

      # 🔵🟢 DYNAMIC BLUE-GREEN DEPLOYMENT
      - name: Determine Target Environment (The Toggle)
        id: toggle
        run: |
          ACTIVE_ENV=$(kubectl get svc flask-service -n aceest-fitness -o=jsonpath='{.spec.selector.version}' --kubeconfig=kubeconfig.yaml --ignore-not-found)
          
          if [ -z "$ACTIVE_ENV" ] || [ "$ACTIVE_ENV" == "green" ]; then
            TARGET_ENV="blue"
          else
            TARGET_ENV="green"
          fi
          
          echo "Currently Live: ${ACTIVE_ENV:-none}"
          echo "Deploying to: $TARGET_ENV"
          
          # Set for current job
          echo "TARGET_ENV=$TARGET_ENV" >> $GITHUB_ENV
          echo "ACTIVE_ENV=$ACTIVE_ENV" >> $GITHUB_ENV
          
          # Set for downstream Rollback job
          echo "target_env=$TARGET_ENV" >> $GITHUB_OUTPUT
          echo "active_env=$ACTIVE_ENV" >> $GITHUB_OUTPUT

      - name: Prepare & Deploy Target Environment
        run: |
          VERSION=v${{ github.run_number }}
          TARGET=${{ env.TARGET_ENV }}
          
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_NAME:$VERSION|g" k8s-manifests/deployment.yaml > target.yaml
          sed -i "s|name: flask-app|name: flask-app-$TARGET|g" target.yaml
          # Perform direct replacement of the version placeholder
          sed -i "s|VERSION_PLACEHOLDER|$TARGET|g" target.yaml

          kubectl apply -f k8s-manifests/namespace.yaml --kubeconfig=kubeconfig.yaml
          kubectl apply -n aceest-fitness -f k8s-manifests/service.yaml --kubeconfig=kubeconfig.yaml || true
          
          kubectl apply -n aceest-fitness -f target.yaml --kubeconfig=kubeconfig.yaml

      - name: Wait and Test Target
        run: |
          TARGET=${{ env.TARGET_ENV }}
          
          kubectl wait --for=condition=available deployment/flask-app-$TARGET \
            -n aceest-fitness --timeout=120s \
            --kubeconfig=kubeconfig.yaml

          kubectl port-forward deployment/flask-app-$TARGET 9091:5000 \
            -n aceest-fitness --kubeconfig=kubeconfig.yaml &
          sleep 5
          curl -f http://localhost:9091 | grep "ACEest Fitness API running"

      # 🔁 SWITCH TRAFFIC
      - name: Switch Traffic to Target
        run: |
          TARGET=${{ env.TARGET_ENV }}
          
          echo "Tests passed! Switching live traffic to $TARGET..."
          kubectl patch service flask-service \
            -n aceest-fitness \
            -p '{"spec":{"selector":{"app":"flask-app","version":"'"$TARGET"'"}}}' \
            --kubeconfig=kubeconfig.yaml

  # 🔁 ROLLBACK
  rollback:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Set kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml

      - name: Revert Traffic to Previous Version
        run: |
          PREVIOUS_STABLE="${{ needs.deploy.outputs.active_env }}"
          
          if [ -z "$PREVIOUS_STABLE" ]; then
            echo "No previous stable version found. Manual intervention required."
            exit 1
          fi

          echo "Deployment failed. Reverting traffic to $PREVIOUS_STABLE..."
          
          kubectl patch service flask-service \
            -n aceest-fitness \
            -p "{\"spec\":{\"selector\":{\"app\":\"flask-app\",\"version\":\"$PREVIOUS_STABLE\"}}}" \
            --kubeconfig=kubeconfig.yaml